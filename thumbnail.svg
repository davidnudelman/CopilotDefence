<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#243a6b"/>
      <stop offset="55%" stop-color="#1b2640"/>
      <stop offset="100%" stop-color="#0a0f18"/>
    </linearGradient>
    <radialGradient id="glow" cx="26%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#6ab0ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6ab0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe79a"/>
      <stop offset="100%" stop-color="#e08f2c"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b3c63"/>
      <stop offset="100%" stop-color="#141d31"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe3ff"/>
      <stop offset="100%" stop-color="#5f8fd6"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#e89a35"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Faint defense path in the backdrop -->
  <path d="M-20 120 H120 V300 H320 V160 H520" fill="none" stroke="#ffffff" stroke-opacity="0.04"
        stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M760 560 H980 V400 H1180 V520" fill="none" stroke="#ffffff" stroke-opacity="0.04"
        stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== Family crest emblem (left) ===== -->
  <g transform="translate(8 116) scale(0.78)">
    <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="3">
      <line x1="256" y1="256" x2="256" y2="98"/>
      <line x1="256" y1="256" x2="393" y2="177"/>
      <line x1="256" y1="256" x2="393" y2="335"/>
      <line x1="256" y1="256" x2="256" y2="414"/>
      <line x1="256" y1="256" x2="119" y2="335"/>
      <line x1="256" y1="256" x2="119" y2="177"/>
    </g>
    <!-- Frost -->
    <g transform="translate(256 98)">
      <circle r="42" fill="#16243f" stroke="#9bd9ff" stroke-width="4"/>
      <g stroke="#cdeeff" stroke-width="5" stroke-linecap="round">
        <line x1="0" y1="-20" x2="0" y2="20"/><line x1="-17" y1="-10" x2="17" y2="10"/><line x1="-17" y1="10" x2="17" y2="-10"/>
        <line x1="0" y1="-20" x2="-6" y2="-13"/><line x1="0" y1="-20" x2="6" y2="-13"/>
        <line x1="0" y1="20" x2="-6" y2="13"/><line x1="0" y1="20" x2="6" y2="13"/>
      </g>
    </g>
    <!-- Sniper -->
    <g transform="translate(393 177)">
      <circle r="42" fill="#1c2a16" stroke="#a8e055" stroke-width="4"/>
      <circle r="17" fill="none" stroke="#d4f29a" stroke-width="4"/>
      <circle r="3.5" fill="#d4f29a"/>
      <g stroke="#d4f29a" stroke-width="4" stroke-linecap="round">
        <line x1="0" y1="-24" x2="0" y2="-12"/><line x1="0" y1="24" x2="0" y2="12"/>
        <line x1="-24" y1="0" x2="-12" y2="0"/><line x1="24" y1="0" x2="12" y2="0"/>
      </g>
    </g>
    <!-- Tactics -->
    <g transform="translate(393 335)">
      <circle r="42" fill="#2e2611" stroke="#d8b24a" stroke-width="4"/>
      <g fill="#f0d488">
        <circle cx="0" cy="0" r="13"/>
        <rect x="-4" y="-23" width="8" height="11" rx="2"/>
        <rect x="-4" y="12" width="8" height="11" rx="2"/>
        <rect x="-23" y="-4" width="11" height="8" rx="2"/>
        <rect x="12" y="-4" width="11" height="8" rx="2"/>
        <rect x="-19" y="-19" width="9" height="9" rx="2" transform="rotate(45)"/>
        <rect x="10" y="10" width="9" height="9" rx="2" transform="rotate(45)"/>
      </g>
      <circle r="5.5" fill="#2e2611"/>
    </g>
    <!-- Burn -->
    <g transform="translate(256 414)">
      <circle r="42" fill="#3a1c0e" stroke="#ff8a3a" stroke-width="4"/>
      <path d="M0 -22 C14 -6 20 2 14 12 C10 19 2 22 0 22 C-2 22 -10 19 -14 12 C-20 2 -10 -6 0 -22 Z" fill="#ffb061"/>
      <path d="M0 -6 C8 2 9 8 4 14 C1 17 -1 17 -4 14 C-9 8 -6 2 0 -6 Z" fill="#ffe14a"/>
    </g>
    <!-- Bruiser -->
    <g transform="translate(119 335)">
      <circle r="42" fill="#3a1818" stroke="#ff7e7e" stroke-width="4"/>
      <rect x="-4" y="-24" width="8" height="34" rx="3" fill="#e9eefc"/>
      <path d="M-4 -24 L4 -24 L0 -30 Z" fill="#ffffff"/>
      <rect x="-15" y="9" width="30" height="7" rx="3" fill="#ffcf6a"/>
      <rect x="-4" y="14" width="8" height="11" rx="3" fill="#caa24a"/>
    </g>
    <!-- Arcane -->
    <g transform="translate(119 177)">
      <circle r="42" fill="#281640" stroke="#b06bf0" stroke-width="4"/>
      <path d="M0 -23 C4 -7 6 -5 22 0 C6 5 4 7 0 23 C-4 7 -6 5 -22 0 C-6 -5 -4 -7 0 -23 Z" fill="#d6abff"/>
      <circle r="4" fill="#ffffff"/>
    </g>
    <!-- Crest -->
    <polygon points="256,150 339,200 339,300 256,350 173,300 173,200" fill="url(#gold)"/>
    <polygon points="256,162 329,206 329,294 256,338 183,294 183,206" fill="url(#core)" stroke="#0a0f18" stroke-width="2"/>
    <path d="M256 198 L298 218 L298 262 C298 286 280 304 256 314 C232 304 214 286 214 262 L214 218 Z" fill="url(#gem)" stroke="#1c2436" stroke-width="3"/>
    <path d="M256 198 L298 218 L256 240 L214 218 Z" fill="#ffffff" opacity="0.30"/>
    <line x1="256" y1="240" x2="256" y2="314" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
  </g>

  <!-- ===== Title block (right) ===== -->
  <g font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
    <text x="512" y="248" font-size="92" font-weight="900" fill="url(#title)" letter-spacing="-3">COPILOT</text>
    <text x="512" y="342" font-size="92" font-weight="900" fill="#eef3ff" letter-spacing="-3">DEFENCE</text>
    <rect x="516" y="376" width="600" height="3" fill="#3f6fd6" opacity="0.7"/>
    <text x="516" y="420" font-size="25" font-weight="600" fill="#9fc0ff">A merge tower defense. Hold the line.</text>
    <!-- family roll-call -->
    <text x="516" y="474" font-size="19" font-weight="800" letter-spacing="0.5">
      <tspan fill="#9bd9ff">FROST</tspan><tspan fill="#5b6b86"> · </tspan><tspan fill="#ff8a3a">BURN</tspan><tspan fill="#5b6b86"> · </tspan><tspan fill="#a8e055">SNIPER</tspan><tspan fill="#5b6b86"> · </tspan><tspan fill="#ff7e7e">BRUISER</tspan><tspan fill="#5b6b86"> · </tspan><tspan fill="#b06bf0">ARCANE</tspan><tspan fill="#5b6b86"> · </tspan><tspan fill="#d8b24a">TACTICS</tspan>
    </text>
  </g>
</svg>
